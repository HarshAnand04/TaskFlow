<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Smart Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2><i class="fas fa-layer-group"></i> TaskFlow</h2>
            <div class="stats-card">
                <h3>Productivity</h3>
                <div class="score-circle" id="scoreCircle">0%</div>
                <p>Tasks Completed</p>
            </div>
            <nav>
                <a href="#" class="active"><i class="fas fa-tasks"></i> All Tasks</a>
                <a href="#"><i class="fas fa-star"></i> High Priority</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>My Dashboard</h1>
                <button id="addTaskBtn" class="btn-primary"><i class="fas fa-plus"></i> New Task</button>
            </header>

            <!-- Filters -->
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="To Do">To Do</button>
                <button class="filter-btn" data-filter="In Progress">In Progress</button>
                <button class="filter-btn" data-filter="Done">Done</button>
            </div>

            <!-- Task List -->
            <div id="taskList" class="task-grid">
                <!-- Tasks injected here via JS -->
            </div>
        </main>
    </div>

    <!-- Add Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add New Task</h2>
            <form id="taskForm">
                <input type="text" id="title" placeholder="Task Title" required>
                <textarea id="description" placeholder="Description"></textarea>
                <div class="form-row">
                    <select id="priority">
                        <option value="Low">Low Priority</option>
                        <option value="Medium" selected>Medium Priority</option>
                        <option value="High">High Priority</option>
                    </select>
                    <select id="status">
                        <option value="To Do">To Do</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Done">Done</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Create Task</button>
            </form>
        </div>
    </div>

    <!-- Chatbot Widget -->
    <div class="chatbot-container">
        <button id="chatToggle" class="chat-toggle"><i class="fas fa-robot"></i></button>
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <h4>TaskBot Assistant</h4>
                <span id="closeChat">&times;</span>
            </div>
            <div class="chat-body" id="chatBody">
                <div class="message bot">Hello! I'm TaskBot. Ask me to "add a task" or check your "stats".</div>
            </div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Type a message...">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
